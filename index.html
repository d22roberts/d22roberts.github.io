<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberWaze • Waze for Cybertruck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; color: white; font-family: system-ui; overflow: hidden; }
        #header { background: #1f2937; }
        #waze-iframe { width: 100%; height: calc(100vh - 68px); border: none; }
        button { transition: all 0.2s; }
    </style>
</head>
<body>
    <!-- Header (Tesla-style) -->
    <div id="header" class="px-6 py-4 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-x-3">
            <div class="text-4xl">⚡</div>
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-lime-400">CYBERWAZE</h1>
                <p class="text-xs text-gray-400 -mt-1">Live Traffic • Powered by Waze</p>
            </div>
        </div>

        <div class="flex items-center gap-x-3">
            <!-- Location status -->
            <div id="status" onclick="getCurrentLocation()" 
                 class="flex items-center gap-x-2 bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-3xl cursor-pointer text-sm font-medium">
                <div class="w-3 h-3 bg-lime-400 rounded-full animate-pulse"></div>
                <span id="status-text">Acquiring GPS...</span>
            </div>

            <!-- My Location button -->
            <button onclick="getCurrentLocation()" 
                    class="flex items-center gap-x-3 bg-lime-400 hover:bg-lime-300 text-black font-semibold px-6 py-3 rounded-3xl text-lg">
                📍 MY LOCATION
            </button>

            <!-- Search -->
            <div class="flex">
                <input id="search-input" 
                       onkeydown="if(event.key==='Enter') searchDestination()"
                       type="text" 
                       placeholder="Where to? (address, place, or city)"
                       class="bg-gray-800 border border-gray-600 focus:border-lime-400 w-96 px-6 py-3 rounded-l-3xl text-lg outline-none">
                <button onclick="searchDestination()" 
                        class="bg-white hover:bg-gray-100 text-black font-semibold px-8 rounded-r-3xl text-lg">GO</button>
            </div>
        </div>

        <div class="flex items-center gap-x-4 text-sm">
            <button onclick="toggleFullscreen()" class="px-5 py-3 hover:bg-gray-700 rounded-3xl">⛶ FULLSCREEN</button>
            <a href="https://www.waze.com" target="_blank" class="text-gray-400 hover:text-white">Waze.com</a>
        </div>
    </div>

    <!-- Waze Live Map Embed -->
    <iframe id="waze-iframe" allowfullscreen></iframe>

    <script>
        const iframe = document.getElementById('waze-iframe');
        let currentLat = 27.755; // Default: Wimauma, FL area
        let currentLon = -82.300;

        function updateMap(lat, lon, zoom = 16) {
            currentLat = lat;
            currentLon = lon;
            const url = `https://embed.waze.com/iframe?zoom=${zoom}&lat=${lat}&lon=${lon}&pin=1`;
            iframe.src = url;
            document.getElementById('status-text').innerHTML = `📍 ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        }

        // Get vehicle GPS
        function getCurrentLocation() {
            const statusEl = document.getElementById('status-text');
            statusEl.textContent = 'Getting GPS...';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        updateMap(pos.coords.latitude, pos.coords.longitude, 17);
                    },
                    (err) => {
                        statusEl.textContent = 'Location blocked • Using default';
                        updateMap(currentLat, currentLon);
                        console.log('Geolocation error:', err);
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                statusEl.textContent = 'Geolocation not supported';
            }
        }

        // Deep link search + navigation (opens Waze web with route)
        function searchDestination() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            
            const deepLink = `https://waze.com/ul?q=${encodeURIComponent(query)}&navigate=yes`;
            window.open(deepLink, '_blank');
            
            // Optional: also center the live map on approximate area
            console.log('🚀 Deep link opened for:', query);
        }

        // Fullscreen for immersive car experience
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Auto-start when page loads
        window.onload = () => {
            // Tailwind ready
            getCurrentLocation(); // Try GPS immediately
            
            // Fallback to default Florida location after 2s if GPS fails
            setTimeout(() => {
                if (!iframe.src) {
                    updateMap(currentLat, currentLon, 14);
                }
            }, 2000);
        };
    </script>
</body>
</html>
